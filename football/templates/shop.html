{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Sports Shop</title>
    <style>
        .items-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px; /* Space between items */
        }
        .item {
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 5px;
            width: 250px; /* Set a fixed width for uniformity */
            text-align: center;
        }
        .item img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    {% include 'navbar.html' %}

    <div class="items-container">
        {% for item in items %}
        <div class="item">
            <img src="{{ item.image.url }}" alt="{{ item.name }}">
            <h2>{{ item.name }}</h2>
            <p>{{ item.description }}</p>
            <p>Price: ${{ item.price }}</p>
            <p>Stock: {{ item.stock }}</p>
            <form action="{% url 'add_to_cart' item.id %}" method="post">
                {% csrf_token %}
                <button type="submit">Add to Cart</button>
            </form>
        </div>
        {% endfor %}
    </div>
</body>
</html>
