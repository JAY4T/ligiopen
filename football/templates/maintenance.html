{% load static %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/x-icon"
      href="{% static 'images/li__1_-removebg-preview.ico' %}"
    />
    <title>Ligi Open</title>

    <!-- Font awesome -->
    <script
      src="https://kit.fontawesome.com/456d64337e.js"
      crossorigin="anonymous"
    ></script>

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/maintenance.css' %}" />
  </head>
  <body>
    <div class="container">
      <div class="maintenance-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
          <style>
            @keyframes spin {
              from {
                transform: rotate(0deg);
              }
              to {
                transform: rotate(360deg);
              }
            }
            @keyframes spinReverse {
              from {
                transform: rotate(360deg);
              }
              to {
                transform: rotate(0deg);
              }
            }
            .gear-large {
              transform-origin: 64px 68px;
              animation: spin 10s linear infinite;
            }
            .gear-small {
              transform-origin: 92.5px 38.75px;
              animation: spinReverse 10s linear infinite;
            }
          </style>

          <!-- Large gray gear -->
          <g class="gear-large">
            <path
              d="M40 0c-2.2 0-4 1.8-4 4v4.2c-2.4 0.7-4.7 1.8-6.7 3.2l-3-3c-1.6-1.6-4.1-1.6-5.7 0l-5.7 5.7c-1.6 1.6-1.6 4.1 0 5.7l3 3c-1.4 2-2.5 4.3-3.2 6.7H10c-2.2 0-4 1.8-4 4v8c0 2.2 1.8 4 4 4h4.2c0.7 2.4 1.8 4.7 3.2 6.7l-3 3c-1.6 1.6-1.6 4.1 0 5.7l5.7 5.7c1.6 1.6 4.1 1.6 5.7 0l3-3c2 1.4 4.3 2.5 6.7 3.2V72c0 2.2 1.8 4 4 4h8c2.2 0 4-1.8 4-4v-4.2c2.4-0.7 4.7-1.8 6.7-3.2l3 3c1.6 1.6 4.1 1.6 5.7 0l5.7-5.7c1.6-1.6 1.6-4.1 0-5.7l-3-3c1.4-2 2.5-4.3 3.2-6.7H72c2.2 0 4-1.8 4-4v-8c0-2.2-1.8-4-4-4h-4.2c-0.7-2.4-1.8-4.7-3.2-6.7l3-3c1.6-1.6 1.6-4.1 0-5.7L62 8.4c-1.6-1.6-4.1-1.6-5.7 0l-3 3c-2-1.4-4.3-2.5-6.7-3.2V4c0-2.2-1.8-4-4-4h-8z"
              fill="#E5E7EB"
              stroke="#D1D5DB"
              stroke-width="2"
              transform="translate(20,30)"
            />
            <circle cx="64" cy="68" r="20" fill="#F3F4F6" />
            <!-- Center hole -->
            <circle cx="64" cy="68" r="8" fill="#D1D5DB" />

          <!-- Small yellow gear -->
          <g class="gear-small">
            <path
              d="M25 0c-1.4 0-2.5 1.1-2.5 2.5v2.6c-1.5 0.4-2.9 1.1-4.2 2l-1.9-1.9c-1-1-2.6-1-3.5 0l-3.5 3.5c-1 1-1 2.6 0 3.5l1.9 1.9c-0.9 1.3-1.6 2.7-2 4.2H6.7c-1.4 0-2.5 1.1-2.5 2.5v5c0 1.4 1.1 2.5 2.5 2.5h2.6c0.4 1.5 1.1 2.9 2 4.2l-1.9 1.9c-1 1-1 2.6 0 3.5l3.5 3.5c1 1 2.6 1 3.5 0l1.9-1.9c1.3 0.9 2.7 1.6 4.2 2v2.6c0 1.4 1.1 2.5 2.5 2.5h5c1.4 0 2.5-1.1 2.5-2.5v-2.6c1.5-0.4 2.9-1.1 4.2-2l1.9 1.9c1 1 2.6 1 3.5 0l3.5-3.5c1-1 1-2.6 0-3.5l-1.9-1.9c0.9-1.3 1.6-2.7 2-4.2h2.6c1.4 0 2.5-1.1 2.5-2.5v-5c0-1.4-1.1-2.5-2.5-2.5h-2.6c-0.4-1.5-1.1-2.9-2-4.2l1.9-1.9c1-1-1-2.6 0-3.5l-3.5-3.5c-1-1-2.6-1-3.5 0l-1.9 1.9c-1.3-0.9-2.7-1.6-4.2-2V2.5c0-1.4-1.1-2.5-2.5-2.5h-5z"
              fill="#FCD34D"
              stroke="#FBBF24"
              stroke-width="1"
              transform="translate(65,15)"
            />
            <circle cx="92.5" cy="38.75" r="12.5" fill="#FDE68A" />
            <!-- Center hole -->
            <circle cx="92.5" cy="38.75" r="5" fill="#FBBF24" />
          </g>
        </svg>
      </div>
      <h1>Site is under maintenance</h1>
      <p>We're working hard to improve the user experience. Stay tuned!</p>
      <div class="buttons">
        <a href="{% url 'home' %}" class="btn btn-primary"

      </div>
    </div>
  </body>
</html>
