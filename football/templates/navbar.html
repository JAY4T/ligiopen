{% load static %}

<!-- navbar.html -->
<head>
  <!-- Font awesome -->
  <script
    src="https://kit.fontawesome.com/456d64337e.js"
    crossorigin="anonymous"
  ></script>

  <!-- Bootstrap 5.02 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
    crossorigin="anonymous"
  />

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
    crossorigin="anonymous"
  ></script>

  <script src="{% static 'js/navbar.js' %}"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="{% static 'css/navbar.css' %}" />
</head>
<header>
  <div class="navbar-main">
    <div class="navbar-logo-left">
      <p class="pre-logo-text">Play</p>
      <img
        src="{% static 'images/li__1_-removebg-preview.ico' %}"
        alt="logo"
        class="ligiopen-logo"
      />
      <p class="post-logo-text">Better</p>
    </div>
    <!-- <nav class="navbar"> -->
    <div class="navbar-main-navigation">
      <a
        href="{% url 'home' %}"
        class="navbar-item {% if request.path == '/' %}active{% endif %}"
        >Home</a
      >
      <!-- <a href="{% url 'finance' %}" class="{% if 'finance' in request.path %}active{% endif %}">Finance</a> -->
      <a
        href="{% url 'about' %}"
        class="navbar-item {% if 'about' in request.path %}active{% endif %}"
        >About</a
      >

      <a
        href="{% url 'fixtures' %}"
        class="navbar-item {% if 'fixture' in request.path %}active{% endif %}"
        >Fixtures</a
      >
      <a
        href="{% url 'clubs' %}"
        class="navbar-item {% if 'club' in request.path %}active{% endif %}"
        >Teams</a
      >
      <a
        href="{% url 'news' %}"
        class="navbar-item {% if 'news' in request.path %}active{% endif %}"
        >News</a
      >
      <a
        href="{% url 'getinvolved' %}"
        class="navbar-item {% if 'getinvolved' in request.path %}active{% endif %}"
        >Get Involved</a
      >
      <a
        href="{% url 'shop' %}"
        class="navbar-item {% if 'shop' in request.path %}active{% endif %}"
        >Shop</a
      >
    </div>
    <div class="navbar navbar-main-navigation navbar-account-buttons">
      <a href="{% url 'register' %}" class="btn-register">Register</a>
      <a href="{% url 'login' %}" class="btn-login">Login</a>

      <!-- <a href="{% url 'contact_us' %}" class="{% if 'contact' in request.path %}active{% endif %}">Contact us</a> -->
    </div>
    <div class="icons">
      <!-- <a href="pages/login.html">Login</a> -->
      <i class="fas fa-bars" id="menu-bars"></i>
    </div>
  </div>
</header>
