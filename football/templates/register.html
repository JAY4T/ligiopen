{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LigiOpen | Sign Up</title>
    <link href="{% static 'css/register.css' %}" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="main-content">
      <div class="image"></div>
      <div class="login-container">
        <h1 class="logo">Ligiopen</h1>
        <h5 class="subtitle">Sign up into your account</h5>
        <form id="signupForm" action="#" method="POST">
          {% csrf_token %}
          <!-- Username field -->
          <div class="form-group">
            <label>Username :</label>
            <div class="input-container">
              <input type="text" name="username" placeholder="Enter username" />
              <svg
                class="icon"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            </div>
          </div>

          <!-- Role field with dropdown icon -->
          <div class="form-group">
            <label>Select role :</label>
            <div class="input-container">
              <select name="role">
                <option value="" disabled selected>Select role</option>
                <option>Player</option>
                <option>Coach</option>
                <option>Admin</option>
              </select>
              <svg
                class="icon"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </div>
          </div>

          <div class="form-group">
            <label>Password :</label>
            <div class="input-container">
              <input type="password" name="password" placeholder="xxxxxxxxx" />
              <svg
                class="icon"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
            </div>
          </div>

          <div class="form-group">
            <label>Confirm Password :</label>
            <div class="input-container">
              <input
                type="password"
                name="confirm_password"
                placeholder="xxxxxxxxx"
              />
              <svg
                class="icon"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
            </div>
          </div>
          <button class="signup-btn">Sign up</button>
        </form>
        <div class="login-link">
          <span>Already have an account? </span>
          <a href="{% url 'login2' %}">Log in here</a>
        </div>
      </div>
    </div>
    <script src="{% static 'js/register.js' %}"></script>
  </body>
</html>
