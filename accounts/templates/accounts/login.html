{% load static %}

<!-- accounts/templates/accounts/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-container {
  width: 100%;
  max-width: 400px;
  padding: 20px;
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  text-align: center;
}

h2 {
  margin-bottom: 20px;
  color: #333;
}

.input-group {
  margin-bottom: 15px;
  text-align: left;
}

.input-group label {
  display: block;
  margin-bottom: 5px;
  color: #555;
  font-size: 14px;
}

.input-box {
  position: relative;
}

.input-box input {
  width: 100%;
  padding: 12px 123px 10px 68px;
  border: 3px solid #ddd;
  border-radius: 5px;
  font-size: 14px;
}

.input-box .icon {
  position: absolute;
  right: 2px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 30px;
  color: #888;
}

.forgot-password {
  display: block;
  margin-top: 10px;
  font-size: 12px;
  color: #007BFF;
  text-decoration: none;
}

.forgot-password:hover {
  text-decoration: underline;
}

.login-btn {
  width: 100%;
  padding: 10px;
  background: #FFD700;
  border: none;
  border-radius: 5px;
  color: #333;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.login-btn:hover {
  background: #ffc107;
}

.login-btn2 {
  width: 100%;
  padding: 10px;
  background: #1ca9c9;
  border: none;
  border-radius: 5px;
  color: #333;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.login-btn2:hover {
  background: #ffc107;
}

.divider {
  margin: 20px 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.divider span {
  background: #fff;
  padding: 0 10px;
  color: #888;
}

.alt-login-btn {
  width: 100%;
  padding: 10px;
  background: #1ca9c9;
  border: none;
  border-radius: 5px;
  color: #fff;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.alt-login-btn:hover {
  background: #0056b3;
  color: #000000;
}
       
        .footer {
    background-color: #2c3e50;
    color: #ecf0f1;
    text-align: center;
    padding: 20px 0;
    margin-top: 20px;
    width: 100%;
    border-top: 2px solid #34495e;
}

.footer-content {
    max-width: 800px;
    margin: 0 auto;
    font-size: 14px;
    line-height: 1.5;
}

.footer-links a {
    color:#4F7942 ;
    text-decoration: none;
    margin: 0 5px;
    font-weight: bold;
}

.footer-links a:hover {
    text-decoration: underline;
    color: #4F7942;
}

.footer .copyright {
    background-color: black;
    color: black;
    padding: 10px;
    margin-top: 10px;
    font-size: 12px;
    border-radius: 5px;
}
 
  
        
    
    </style>
</head>
<body>
    {% include 'navbar.html' %}

   

        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        <br><br>

        <div class="login-container">

          <h1 style="color: #1ca9c9;">LigiOpen</h1>
           
            <h2 style="color: #1ca9c9;">Login into your account</h2>
            <br><br>
            <form class="login-form" method="post">
                {% csrf_token %}
              <div class="input-group">
                <label for="email"><b>Email Id :</b></label>
                <div class="input-box">
                  <input type="text" id="username" name="username" placeholder="username" required>
                  <span class="icon" style="background-color: yellow;">📧</span>
                </div>
              </div>
              <div class="input-group">
                <label for="password"><b>Password</b></label>
                <div class="input-box">
                  <input type="password" id="password" name="password" placeholder="Enter your password" required>
                  <span class="icon" style="background-color: yellow;">🔒</span>
                </div>
              </div>
              <a href="#" class="forgot-password">Forgot password?</a>
              <button type="submit" class="login-btn">Login now</button>
              <div class="divider">
                <span>OR</span>
              </div>
              <button  class="login-btn2" ><a href="{% url 'register' %}" style="color: #34495e;"> Don't have an account? Register here</a></button>
            </form>
          </div>

          <br><br><br> <br><br><br>



  
    {% include 'footer.html' %}

    
</body>
</html>
