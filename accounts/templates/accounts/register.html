{% load static %}

<!-- accounts/templates/accounts/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .signup-container {
  width: 100%;
  max-width: 400px;
  padding: 20px;
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  text-align: center;
}

.brand-name {
  font-size: 24px;
  color: #2a9d8f;
  margin-bottom: 10px;
}

.tagline {
  color: #555;
  font-size: 14px;
  margin-bottom: 20px;
}

.input-group {
  margin-bottom: 15px;
  text-align: left;
}

.input-group label {
  display: block;
  margin-bottom: 5px;
  font-size: 14px;
  color: #333;
}

.input-group input {
  width: 100%;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 5px;
  font-size: 14px;
}

.signup-btn {
  width: 100%;
  padding: 10px;
  background: #FFD700;
  border: none;
  border-radius: 5px;
  color: #333;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}

.signup-btn:hover {
  background: #ffc107;
}
       
        .footer {
    background-color: #2c3e50;
    color: #ecf0f1;
    text-align: center;
    padding: 20px 0;
    margin-top: 20px;
    width: 100%;
    border-top: 2px solid #34495e;
}

.footer-content {
    max-width: 800px;
    margin: 0 auto;
    font-size: 14px;
    line-height: 1.5;
}

.footer-links a {
    color:#4F7942 ;
    text-decoration: none;
    margin: 0 5px;
    font-weight: bold;
}

.footer-links a:hover {
    text-decoration: underline;
    color: #4F7942;
}

.footer .copyright {
    background-color: black;
    color: black;
    padding: 10px;
    margin-top: 10px;
    font-size: 12px;
    border-radius: 5px;
}
 
  
        
    
    </style>
</head>
<body>
    {% include 'navbar.html' %}

   

        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        <br><br>

        <div class="signup-container">
          <h1 style="color: #1ca9c9;">LigiOpen</h1>
            <p class="tagline">Sign up into your account</p>
            <form class="signup-form">
              <div class="input-group">
                <label for="username"><b>Username:</b></label>
                <input type="text" id="username" placeholder="Enter username..." required>
              </div>
              <div class="input-group">
                <label for="role"><b>Select role:</b></label>
                <input type="text" id="role" placeholder="+91 - 98556 58000" required>
              </div>
              <div class="input-group">
                <label for="password"><b>Password:</b></label>
                <input type="password" id="password" placeholder="********" required>
              </div>
              <div class="input-group">
                <label for="confirm-password"><b>Confirm Password:</b></label>
                <input type="password" id="confirm-password" placeholder="********" required>
              </div>
              <button type="submit" class="signup-btn">Sign up</button>
            </form>
          </div>

          <br><br><br> <br><br><br>



  
    {% include 'footer.html' %}

    
</body>
</html>
